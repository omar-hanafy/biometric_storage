name: biometric_storage
description: |
  Secure storage with optional biometric protection for Android, iOS, and macOS.
  Linux and Windows use unauthenticated OS-backed storage, and web stores plaintext
  data in localStorage and is not secure storage.
version: 5.1.1-dev.2
homepage: https://github.com/omar-hanafy/biometric_storage
repository: https://github.com/omar-hanafy/biometric_storage

environment:
  sdk: '>=3.11.4 <4.0.0'
  flutter: ">=3.41.6"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  logging: ^1.3.0
  plugin_platform_interface: ^2.1.8

  ffi: ^2.2.0
  win32: ^6.0.1
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # This section identifies this Flutter project as a plugin project.
  # The androidPackage and pluginClass identifiers should not ordinarily
  # be modified. They are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        package: design.codeux.biometric_storage
        pluginClass: BiometricStoragePlugin
      ios:
        pluginClass: BiometricStoragePlugin
      macos:
        pluginClass: BiometricStorageMacOSPlugin
      linux:
        pluginClass: BiometricStoragePlugin
      windows:
        dartPluginClass: Win32BiometricStoragePlugin
        fileName: src/biometric_storage_win32.dart
      web:
        pluginClass: BiometricStoragePluginWeb
        fileName: src/biometric_storage_web.dart

topics:
  - biometrics
  - encryption
  - storage
  - security
  - secure-storage
screenshots:
  - description: 'Face ID on iPhone'
    path: doc/screenshot_ios.png
